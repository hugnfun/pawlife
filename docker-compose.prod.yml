version: "3.9"

# 生产环境覆盖配置
# 使用: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4 --log-level warning
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  celery-worker:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  celery-beat:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  postgres:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  redis:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  nginx:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
