version: "3.9"

# 开发环境覆盖配置
# 使用: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://pawlife:pawlife_dev@postgres:5432/pawlife
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - DEBUG=true
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --log-level debug

  celery-worker:
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://pawlife:pawlife_dev@postgres:5432/pawlife
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - DEBUG=true
