name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # 后端测试
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: pawlife
          POSTGRES_PASSWORD: pawlife_test
          POSTGRES_DB: pawlife_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint with ruff
        continue-on-error: true  # 历史债 197 处，非阻断；P1 阶段独立分支修复
        run: |
          cd backend
          ruff check . --config pyproject.toml

      - name: Type check with mypy
        continue-on-error: true  # 历史债，非阻断；P1 阶段独立分支修复
        run: |
          cd backend
          mypy . --ignore-missing-imports

      - name: Run Alembic migration
        env:
          DATABASE_URL: postgresql+asyncpg://pawlife:pawlife_test@localhost:5432/pawlife_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: testing
        run: |
          cd backend
          alembic -c alembic.ini upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://pawlife:pawlife_test@localhost:5432/pawlife_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: testing
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

  # 前端检查
  frontend-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Type check
        continue-on-error: true  # uni-app 类型未完全覆盖，10 处历史类型错误；P1 阶段独立分支修复
        run: |
          cd frontend
          npm run type-check

      - name: Run tests
        run: |
          cd frontend
          npx vitest run --reporter=verbose

  # Docker 构建测试
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-check]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pawlife:test .

      - name: Test Docker Compose
        run: |
          docker compose -f docker-compose.yml up -d postgres redis
          sleep 10
          docker compose -f docker-compose.yml down
