# Alembic 数据库迁移配置

[alembic]
# 迁移脚本目录（相对 alembic.ini 所在目录）
script_location = alembic

# 版本文件模板
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# 设置为 True 以避免迁移文件名使用 "%%"
# rewrite_slug = False

# 是否使用双引号包裹标识符
# quote_schema = false

# 迁移前的钩子
# before_revision = "some.module:before_revision"

# SQLAlchemy URL（从环境变量读取）
sqlalchemy.url = postgresql+asyncpg://%(DB_USER)s:%(DB_PASSWORD)s@%(DB_HOST)s:%(DB_PORT)s/%(DB_NAME)s

# 迁移环境超时
# timeout = 300

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
