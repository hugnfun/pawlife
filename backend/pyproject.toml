[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    "alembic/versions",
    "tests",
    "scripts",
]

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "F",  # pyflakes
    "W",  # pycodestyle warnings
    "I",  # isort
]
ignore = [
    "E501",  # line too long (formatter handles)
    "E402",  # module level import not at top of file
    # SQLAlchemy 惯用法：`Model.is_active == True` 会被翻译成 SQL WHERE 谓词，
    # 直接用 `Model.is_active` 会返回 Column 对象而不是 SQL 表达式。
    # 官方推荐可改为 `.is_(True)`，但项目内多达 16 处、语义一致，
    # 且改动风险 > 价值，此处统一忽略。
    "E712",  # true-false-comparison
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
follow_imports = "silent"
show_error_codes = true
warn_unused_ignores = false
warn_redundant_casts = true
exclude = [
    "alembic/versions",
    "tests",
    "scripts",
]

[[tool.mypy.overrides]]
module = "tests.*"
ignore_errors = true
